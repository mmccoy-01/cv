name: Render Quarto PDF and Deploy to GitHub Pages

on:
  schedule:
    - cron: '7 0 * * 0'
      timezone: 'America/New_York'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_VERSION: '4.3.2'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libicu-dev \
            libcurl4-openssl-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ env.R_VERSION }}
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: "${{ runner.os }}-${{ env.R_VERSION }}-cv-pkgs-v2"
          restore-keys: |
            ${{ runner.os }}-${{ env.R_VERSION }}-cv-pkgs-

      - name: Install R packages
        shell: Rscript {0}
        run: |
          install.packages(
            c(
              "knitr",
              "dplyr",
              "stringr",
              "lubridate",
              "kableExtra",
              "googlesheets4",
              "xml2",
              "rvest",
              "pander",
              "stringi"
            ),
            repos = "https://cloud.r-project.org"
          )

      - name: Install TinyTeX
        shell: bash
        run: |
          wget -qO- "https://yihui.org/tinytex/install-bin-unix.sh" | sh
          echo "$HOME/.TinyTeX/bin/x86_64-linux" >> $GITHUB_PATH

      - name: Install LaTeX packages
        run: |
          tlmgr install marvosym parskip fancyhdr lastpage xecjk hyperref xcolor

      - name: Render PDF
        run: |
          quarto render cv-mfm.qmd --to pdf

      - name: Set up Git config
        run: |
          git config --global user.name "Michael McCoy"
          git config --global user.email "mccoym43@rowan.edu"

      - name: Commit and push PDF
        run: |
          git add cv-mfm.pdf
          git commit -m "Update rendered PDF" || echo "No changes to commit"
          git push

      - name: Prepare site files
        run: |
          mkdir -p _site
          cp cv-mfm.pdf _site/cv-mfm.pdf
          touch _site/.nojekyll
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Michael F. McCoy III CV</title>
            <style>
              html, body {
                margin: 0;
                padding: 0;
                height: 100%;
                background: white;
              }
              iframe {
                width: 100%;
                height: 100vh;
                border: 0;
              }
            </style>
          </head>
          <body>
            <iframe src="./cv-mfm.pdf" title="Curriculum Vitae"></iframe>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4