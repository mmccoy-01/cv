name: Render Quarto PDF

on:
  push:
  schedule:
    # Midnight EST / 5:00 UTC every Sunday
    - cron: '0 5 * * 0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_VERSION: '4.3.2'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libicu-dev libcurl4-openssl-dev libfontconfig1-dev libharfbuzz-dev libfribidi-dev libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ env.R_VERSION }}
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: "${{ runner.os }}-${{ env.R_VERSION }}-cv-pkgs-v2"
          restore-keys: |
            ${{ runner.os }}-${{ env.R_VERSION }}-cv-pkgs-

      - name: Install R packages
        shell: Rscript {0}
        run: |
          install.packages(
            c(
              "knitr",
              "dplyr",
              "stringr",
              "lubridate",
              "kableExtra",
              "googlesheets4",
              "xml2",
              "rvest",
              "pander",
              "stringi",
              "pkgdown"
            ),
            repos = "https://cloud.r-project.org"
          )

      - name: Install TinyTeX
        shell: bash
        run: |
          wget -qO- "https://yihui.org/tinytex/install-bin-unix.sh" | sh
          echo "$HOME/.TinyTeX/bin/x86_64-linux" >> $GITHUB_PATH

      - name: Install LaTeX packages
        run: |
          tlmgr install marvosym parskip fancyhdr lastpage xecjk hyperref xcolor

      - name: Render PDF
        run: |
          quarto render cv-mfm.qmd --to pdf

      - name: Set up Git config
        run: |
          git config --global user.name "Michael McCoy"
          git config --global user.email "mccoym43@rowan.edu"

      - name: Commit and push PDF
        run: |
          git add cv-mfm.pdf
          git commit -m "Update rendered PDF" || echo "No changes to commit"
          git push